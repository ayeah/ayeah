<header class=header id=header>
<nav class=nav>
<a href=/ class=logo>
<div class=logo-icon>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M11 12h.01"/>
<path d="M13 22c.5-.5 1.12-1 2.5-1-1.38.0-2-.5-2.5-1"/>
<path d="M14 2a3.28 3.28.0 01-3.227 1.798l-6.17-.561A2.387 2.387.0 104.387 8H15.5a1 1 0 010 13 1 1 0 000-5H12A7 7 0 015 9V8"/>
<path d="M14 8a8.5 8.5.0 010 8"/>
<path d="M16 16c2 0 4.5-4 4-6"/>
</svg>
</div>
<span class=logo-text>{{ .Site.Title }}</span>
</a>
<ul class=nav-menu id=navMenu>
{{ range .Site.Menus.main }}
<li class=nav-item><a href={{ .URL }} class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a></li>
{{ end }}
<li class=nav-item>
<div class=nav-link style=cursor:pointer>标签
<svg style="display:inline;width:14px;height:14px;margin-left:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
</div>
<div style="position:absolute;top:100%;right:0;margin-top:.5rem;min-width:180px;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:all .3s ease;z-index:100">
<div style=padding:.5rem>
{{ range first 5 .Site.Taxonomies.tags.ByCount }}
<a href={{ .Page.Permalink }} style="display:block;padding:.5rem 1rem;color:var(--text-secondary);text-decoration:none;border-radius:8px;font-size:.875rem;transition:all .3s ease">{{ .Page.Title }}
<span style=float:right;color:var(--text-muted);font-size:.75rem>{{ .Count }}</span>
</a>
{{ end }}
<a href=/tags/ style="display:block;padding:.5rem 1rem;color:var(--primary);text-decoration:none;border-radius:8px;font-size:.875rem;transition:all .3s ease;border-top:1px solid var(--border-light);margin-top:.5rem;padding-top:.75rem">更多...
<svg style="display:inline;width:12px;height:12px;margin-left:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
</a>
</div>
</div>
</li>
</ul>
<button class=menu-toggle id=menuToggle aria-label=切换菜单>
<span></span><span></span><span></span>
</button>
</nav>
</header>
<script>
const header=document.getElementById("header");
window.addEventListener("scroll",()=>{window.scrollY>50?header.classList.add("scrolled"):header.classList.remove("scrolled")});
const menuToggle=document.getElementById("menuToggle"),navMenu=document.getElementById("navMenu");
menuToggle.addEventListener("click",()=>{navMenu.classList.toggle("active")});
const tagsItem=document.querySelector(".nav-item:last-child");
if(tagsItem){const e=tagsItem.querySelector("div:last-child");
tagsItem.addEventListener("mouseenter",()=>{e.style.opacity="1",e.style.visibility="visible"});
tagsItem.addEventListener("mouseleave",()=>{e.style.opacity="0",e.style.visibility="hidden"})}
</script>
