<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="800" height="750">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/>
    </marker>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="750" fill="#020617"/>
  <rect width="800" height="750" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Claude Desktop 偷天换日 — 架构图</text>
  <text x="400" y="65" text-anchor="middle" fill="#64748b" font-size="11">无需注册 · 无需科学上网 · 小白友好</text>

  <!-- ══════════ LAYER 1: Windows PC ══════════ -->
  <!-- Region box -->
  <rect x="50" y="90" width="700" height="120" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="70" y="112" fill="#fbbf24" font-size="10" font-weight="600">你的 Windows 电脑</text>

  <!-- Claude Desktop box -->
  <rect x="250" y="130" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="250" y="130" width="300" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="600">Claude Desktop App</text>
  <text x="400" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">启动后读取注册表配置</text>

  <!-- Arrow down -->
  <line x1="400" y1="190" x2="400" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════ LAYER 2: Registry ══════════ -->
  <rect x="100" y="245" width="600" height="100" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="120" y="267" fill="#a78bfa" font-size="10" font-weight="600">Windows 注册表修改</text>

  <!-- Registry key box -->
  <rect x="140" y="280" width="520" height="50" rx="4" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="160" y="298" fill="#c4b5fd" font-size="9">HKEY_CURRENT_USER\SOFTWARE\Policies\Claude</text>
  <text x="160" y="313" fill="#e9d5ff" font-size="10">inferenceGatewayBaseUrl = https://openai.mozhevip.top</text>
  <text x="160" y="325" fill="#e9d5ff" font-size="10">inferenceGatewayApiKey    = sk-xxxxxxxx</text>

  <!-- Arrow down -->
  <line x1="400" y1="345" x2="400" y2="395" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════ LAYER 3: Relay ══════════ -->
  <!-- Region box -->
  <rect x="50" y="400" width="700" height="130" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="70" y="422" fill="#34d399" font-size="10" font-weight="600">第三方中转站 / 模型服务平台</text>

  <!-- Relay box -->
  <rect x="170" y="440" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="170" y="440" width="200" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="270" y="462" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">中转站</text>
  <text x="270" y="478" text-anchor="middle" fill="#94a3b8" font-size="9">墨者API / SiliconFlow 等</text>

  <!-- Model conversion box -->
  <rect x="430" y="440" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="430" y="440" width="200" height="55" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="530" y="462" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">模型转换</text>
  <text x="530" y="478" text-anchor="middle" fill="#94a3b8" font-size="9">DeepSeek → Claude 协议</text>

  <!-- Arrow between relay boxes -->
  <line x1="370" y1="467" x2="427" y2="467" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow down -->
  <line x1="400" y1="530" x2="400" y2="580" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════ LAYER 4: Anthropic API ══════════ -->
  <rect x="150" y="585" width="500" height="70" rx="12" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="170" y="607" fill="#fb7185" font-size="10" font-weight="600">Anthropic 官方 API / AWS Bedrock</text>

  <rect x="200" y="618" width="400" height="28" rx="6" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="400" y="637" text-anchor="middle" fill="#fda4af" font-size="11">真正的 Claude 模型在这里运行</text>

  <!-- ══════════ Annotations ══════════ -->
  <!-- Left side annotations -->
  <text x="70" y="160" fill="#64748b" font-size="9">① 安装</text>
  <text x="70" y="305" fill="#64748b" font-size="9">② 改注册表</text>
  <text x="70" y="470" fill="#64748b" font-size="9">③ 请求转发</text>
  <text x="70" y="640" fill="#64748b" font-size="9">④ 模型推理</text>

  <!-- Connection dots -->
  <circle cx="55" cy="160" r="3" fill="#22d3ee"/>
  <circle cx="55" cy="300" r="3" fill="#a78bfa"/>
  <circle cx="55" cy="465" r="3" fill="#34d399"/>
  <circle cx="55" cy="635" r="3" fill="#fb7185"/>

  <!-- Legend -->
  <rect x="610" y="660" width="140" height="70" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="620" y="678" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
  <circle cx="622" cy="692" r="3" fill="#22d3ee"/>
  <text x="632" y="695" fill="#94a3b8" font-size="9">前端/客户端</text>
  <circle cx="622" cy="708" r="3" fill="#a78bfa"/>
  <text x="632" y="711" fill="#94a3b8" font-size="9">配置/注册表</text>
  <circle cx="622" cy="724" r="3" fill="#34d399"/>
  <text x="632" y="727" fill="#94a3b8" font-size="9">后端/中转服务</text>
</svg>