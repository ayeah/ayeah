<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="orchestrate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="llm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="tool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="branch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="output" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="420" rx="10" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400.0" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Dify：Agent 是「编好的」</text>

  <!-- User input -->
  <rect x="300" y="55" width="200" height="44" rx="10" fill="url(#box1)" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="76" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">💬 用户输入</text>
  <text x="400" y="91" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">进入工作流</text>

  <line x1="400" y1="99" x2="400" y2="130" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Workflow orchestration -->
  <rect x="250" y="135" width="300" height="50" rx="12" fill="url(#orchestrate)" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="156" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#eef2ff">🔀 工作流编排（画布）</text>
  <text x="400" y="173" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c7d2fe">拖拽节点 → 连接 → 配置参数 → 运行</text>

  <!-- Branch to 4 nodes -->
  <line x1="400" y1="185" x2="400" y2="210" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="80" y1="210" x2="720" y2="210" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="80" y1="210" x2="80" y2="240" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="210" x2="260" y2="240" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="210" x2="540" y2="240" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="210" x2="720" y2="240" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM Node -->
  <rect x="5" y="245" width="150" height="44" rx="8" fill="url(#llm)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="80" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fdf2f8">🧠 LLM 节点</text>
  <text x="80" y="281" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fce7f3">大模型推理/生成</text>

  <!-- Code Node -->
  <rect x="185" y="245" width="150" height="44" rx="8" fill="url(#code)" stroke="#10b981" stroke-width="1.5"/>
  <text x="260" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ecfdf5">💻 代码节点</text>
  <text x="260" y="281" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d1fae5">沙箱运行预设代码</text>

  <!-- Tool Node -->
  <rect x="465" y="245" width="150" height="44" rx="8" fill="url(#tool)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fffbeb">🔧 工具节点</text>
  <text x="540" y="281" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fef3c7">搜索/API/数据库</text>

  <!-- Condition Branch -->
  <rect x="645" y="245" width="150" height="44" rx="8" fill="url(#branch)" stroke="#ea580c" stroke-width="1.5"/>
  <text x="720" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff7ed">🔀 条件分支</text>
  <text x="720" y="281" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fed7aa">IF/ELSE 逻辑判断</text>

  <!-- Converge to output -->
  <line x1="80" y1="289" x2="80" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="289" x2="260" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="540" y1="289" x2="540" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="720" y1="289" x2="720" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="720" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="320" x2="400" y2="340" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="275" y="345" width="250" height="44" rx="10" fill="url(#output)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="400" y="366" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0f172a">✅ 输出结果</text>
  <text x="400" y="381" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0f172a">只能执行画布上安排好的节点，自由度由编排者预先决定</text>
</svg>