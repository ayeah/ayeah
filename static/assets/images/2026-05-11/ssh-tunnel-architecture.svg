<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="agentBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="chromeBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="tunnelBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="cloudBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowLock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#818cf8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="880" height="480" fill="url(#bg)" rx="12"/>

  <text x="440" y="36" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">AI Agent 浏览器自动化架构 — SSH 隧道 + Chrome CDP</text>

  <!-- LEFT SECTION -->
  <rect x="30" y="60" width="280" height="380" rx="10" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#94a3b8">AI Agent 服务器</text>

  <rect x="55" y="110" width="230" height="70" rx="8" fill="url(#agentBox)" filter="url(#shadow)"/>
  <text x="170" y="140" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#eef2ff">AI Agent</text>
  <text x="170" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c7d2fe">OpenClaw / Browser Use</text>

  <rect x="55" y="230" width="230" height="55" rx="8" fill="url(#cloudBox)" filter="url(#shadow)"/>
  <text x="170" y="253" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">CDP Client</text>
  <text x="170" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">connect_over_cdp("localhost:9222")</text>

  <line x1="170" y1="180" x2="170" y2="228" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrowLock)"/>

  <!-- MIDDLE SECTION -->
  <rect x="340" y="60" width="220" height="380" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2dd4bf">SSH 隧道（加密通道）</text>

  <rect x="365" y="120" width="170" height="60" rx="8" fill="url(#tunnelBox)" filter="url(#shadow)"/>
  <text x="450" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ecfdf5">SSH Tunnel</text>
  <text x="450" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ccfbf1">-L 9222:localhost:9222</text>

  <rect x="365" y="235" width="170" height="40" rx="8" fill="url(#tunnelBox)" filter="url(#shadow)" opacity="0.7"/>
  <text x="450" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ecfdf5">autossh 自动重连</text>

  <!-- RIGHT SECTION -->
  <rect x="590" y="60" width="260" height="380" rx="10" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="720" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#94a3b8">桌面 / 常驻服务器</text>

  <rect x="615" y="110" width="210" height="80" rx="8" fill="url(#chromeBox)" filter="url(#shadow)"/>
  <text x="720" y="140" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fffbeb">Chrome</text>
  <text x="720" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fef3c7">--remote-debugging-port=9222</text>
  <text x="720" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fef3c7">--user-data-dir=/path/to/profile</text>

  <rect x="615" y="210" width="210" height="85" rx="8" fill="url(#cloudBox)" filter="url(#shadow)"/>
  <text x="720" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">浏览器登录态</text>
  <text x="720" y="254" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">SSO / LDAP 已登录</text>
  <text x="720" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Cookies + LocalStorage</text>
  <text x="720" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">浏览器扩展就绪</text>

  <line x1="720" y1="190" x2="720" y2="208" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="615" y="320" width="210" height="30" rx="6" fill="#dc2626" opacity="0.8" filter="url(#shadow)"/>
  <text x="720" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fef2f2">绑定 127.0.0.1（禁止外部访问）</text>

  <rect x="615" y="370" width="210" height="45" rx="8" fill="url(#cloudBox)" opacity="0.6"/>
  <text x="720" y="391" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">xvfb（虚拟显示器，无桌面场景）</text>
  <text x="720" y="405" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">或 macOS / Windows 桌面环境</text>

  <line x1="285" y1="150" x2="363" y2="150" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="535" y1="150" x2="613" y2="150" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="325" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2dd4bf">连接</text>
  <text x="575" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2dd4bf">转发</text>

  <text x="440" y="465" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">SSH 隧道是唯一的访问方式 — 绝不将 CDP 端口暴露到公网</text>
</svg>