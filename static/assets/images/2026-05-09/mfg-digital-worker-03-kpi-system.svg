<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="10" fill="url(#bg2)" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0">KPI 考核员定时任务调度架构</text>
  
  <!-- Kong 日志源 -->
  <rect x="40" y="70" width="170" height="55" rx="8" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="125" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ecfdf5">📝 Kong 日志</text>
  <text x="125" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a7f3d0">Loki / Elasticsearch</text>
  
  <line x1="210" y1="97" x2="260" y2="97" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- ERP 修正记录 -->
  <rect x="40" y="155" width="170" height="55" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="125" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fffbeb">🔍 ERP 修正记录</text>
  <text x="125" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fde68a">业务系统 cross-check</text>
  
  <path d="M125,155 L125,135 L265,135 L265,112" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>
  
  <!-- KPI 考核员 Agent（中央） -->
  <rect x="300" y="65" width="200" height="80" rx="12" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff7ed">🤖 KPI 考核员 Agent</text>
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fed7aa">定时任务触发（每日/每周/每月）</text>
  
  <!-- 三个技能 -->
  <rect x="320" y="153" width="55" height="22" rx="4" fill="#1e293b" stroke="#fdba74" stroke-width="1"/>
  <text x="347" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fdba74">① 数据采集</text>
  <rect x="385" y="153" width="55" height="22" rx="4" fill="#1e293b" stroke="#fdba74" stroke-width="1"/>
  <text x="412" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fdba74">② KPI计算</text>
  <rect x="450" y="153" width="55" height="22" rx="4" fill="#1e293b" stroke="#fdba74" stroke-width="1"/>
  <text x="477" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fdba74">③ 报告推送</text>
  
  <line x1="125" y1="125" x2="125" y2="135" stroke="#f97316" stroke-width="1.5"/>
  
  <!-- → KPI 数据库 -->
  <line x1="500" y1="105" x2="560" y2="105" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="565" y="75" width="200" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="665" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">🏆 KPI 考核结果库</text>
  <text x="665" y="116" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">PostgreSQL</text>
  
  <!-- KPI 数据库 → 企业微信 -->
  <line x1="665" y1="135" x2="665" y2="200" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="565" y="205" width="200" height="55" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="665" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#eef2ff">💬 企业微信推送</text>
  <text x="665" y="245" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c7d2fe">日报 / 周报 / 月报 / 告警</text>
  
  <!-- 时间标签 -->
  <rect x="270" y="270" width="260" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">⏰ 日汇总 → 周简报 → 月复盘 → 年评估</text>
</svg>