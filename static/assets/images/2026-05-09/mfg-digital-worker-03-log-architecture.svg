<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#818cf8"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gateway" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="llm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="erp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="logdb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="kpi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="520" rx="12" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">数字员工日志架构 — 双层日志体系</text>

  <!-- Layer labels -->
  <text x="36" y="75" font-family="sans-serif" font-size="11" fill="#64748b">用户层</text>
  <line x1="36" y1="80" x2="100" y2="80" stroke="#475569" stroke-width="1"/>

  <text x="36" y="160" font-family="sans-serif" font-size="11" fill="#64748b">网关层</text>
  <line x1="36" y1="165" x2="100" y2="165" stroke="#475569" stroke-width="1"/>

  <text x="36" y="270" font-family="sans-serif" font-size="11" fill="#64748b">Agent层</text>
  <line x1="36" y1="275" x2="100" y2="275" stroke="#475569" stroke-width="1"/>

  <text x="36" y="395" font-family="sans-serif" font-size="11" fill="#64748b">服务层</text>
  <line x1="36" y1="400" x2="100" y2="400" stroke="#475569" stroke-width="1"/>

  <text x="36" y="495" font-family="sans-serif" font-size="11" fill="#64748b">日志层</text>
  <line x1="36" y1="500" x2="100" y2="500" stroke="#475569" stroke-width="1"/>

  <!-- User/WeChat -->
  <rect x="120" y="55" width="180" height="50" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="210" y="78" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">💬 企业微信</text>
  <text x="210" y="95" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">用户 / 触发指令</text>

  <!-- Kong Gateway -->
  <rect x="120" y="140" width="180" height="60" rx="10" fill="url(#gateway)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="210" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">🛡️ Kong Gateway</text>
  <text x="210" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0f172a">AI Proxy Plugin</text>

  <!-- Agent Containers -->
  <rect x="360" y="60" width="490" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="605" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Agent 容器组 (Docker)</text>

  <rect x="375" y="110" width="145" height="50" rx="8" fill="url(#agent)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="447" y="133" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#eef2ff">🤖 sales-001</text>
  <text x="447" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c7d2fe">业务跟单助理</text>

  <rect x="535" y="110" width="145" height="50" rx="8" fill="url(#agent)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="607" y="133" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#eef2ff">🤖 hr-001</text>
  <text x="607" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c7d2fe">人事考勤专员</text>

  <rect x="695" y="110" width="145" height="50" rx="8" fill="url(#agent)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="767" y="133" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#eef2ff">🤖 kpi-auditor</text>
  <text x="767" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c7d2fe">KPI考核员</text>

  <!-- LLM Provider -->
  <rect x="120" y="370" width="180" height="50" rx="10" fill="url(#llm)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="210" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fdf2f8">🧠 LLM 服务</text>
  <text x="210" y="410" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fbcfe8">GPT-4 / DeepSeek / glm</text>

  <!-- ERP System -->
  <rect x="330" y="370" width="160" height="50" rx="10" fill="url(#erp)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fffbeb">🗄️ ERP 系统</text>
  <text x="410" y="410" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fef3c7">订单 / 库存 / 客户</text>

  <!-- OA System -->
  <rect x="520" y="370" width="150" height="50" rx="10" fill="url(#erp)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="595" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fffbeb">📋 OA 系统</text>
  <text x="595" y="410" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fef3c7">审批 / 通知 / 流程</text>

  <!-- Log Storage -->
  <rect x="120" y="470" width="260" height="40" rx="10" fill="url(#logdb)" stroke="#10b981" stroke-width="1.5"/>
  <text x="250" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ecfdf5">📝 Layer 1: AI Audit Log</text>
  <text x="250" y="503" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d1fae5">LLM调用记录 / token用量 /耗时</text>

  <rect x="420" y="470" width="260" height="40" rx="10" fill="url(#logdb)" stroke="#10b981" stroke-width="1.5"/>
  <text x="550" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ecfdf5">📝 Layer 2: 通用日志</text>
  <text x="550" y="503" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d1fae5">API调用 / 状态码 / 耗时分布</text>

  <!-- KPI Database -->
  <rect x="700" y="470" width="175" height="40" rx="10" fill="url(#kpi)" stroke="#ea580c" stroke-width="1.5"/>
  <text x="787" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff7ed">🏆 KPI 考核结果</text>
  <text x="787" y="503" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fed7aa">PostgreSQL / 日周月报</text>

  <!-- Arrows: User → Gateway -->
  <line x1="210" y1="105" x2="210" y2="135" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Gateway → Agents -->
  <path d="M300,170 L360,170 L360,135 L370,135" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300,170 L360,170 L360,170 L530,170 L530,135 L535,135" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300,170 L360,170 L360,170 L690,170 L690,135 L695,135" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Agent → Services -->
  <path d="M447,160 L447,200 L210,200 L210,365" fill="none" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M447,160 L447,200 L410,200 L410,365" fill="none" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Arrows: KPI agent → Log layer -->
  <path d="M767,160 L767,220 L550,220 L550,465" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <path d="M767,160 L767,240 L250,240 L250,465" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Arrows: Log → KPI DB -->
  <line x1="380" y1="490" x2="695" y2="490" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on dashed arrows -->
  <rect x="590" y="225" width="100" height="20" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="640" y="239" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fbbf24">📊 采集日志数据</text>

  <!-- Legend -->
  <rect x="700" y="410" width="175" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="787" y="428" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#94a3b8">图例</text>
  <line x1="712" y1="438" x2="745" y2="438" stroke="#2dd4bf" stroke-width="2"/>
  <text x="750" y="442" font-family="sans-serif" font-size="9" fill="#94a3b8">请求/路由</text>
  <line x1="712" y1="452" x2="745" y2="452" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="456" font-family="sans-serif" font-size="9" fill="#94a3b8">数据采集（定时）</text>
</svg>