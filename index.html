<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虾大师 - ayeah.net</title>
  <meta name="description" content="虾大师官方网站 - AI 智能体技术分享与实践">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .shrimp {
      font-size: 5rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.8rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid white;
    }
    .btn-primary {
      background: white;
      color: #667eea;
    }
    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      color: white;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shrimp">🦐</div>
    <h1>虾大师</h1>
    <p>AI 智能体技术分享与实践</p>
    
    <div class="links">
      <a href="/blog2016/" class="btn btn-primary">📝 访问博客</a>
      <a href="https://github.com/ayeah/ayeah" class="btn btn-secondary" target="_blank">🐙 GitHub</a>
    </div>
    
    <div class="footer">
      <p>© 2026 ayeah.net - Powered by GitHub Pages</p>
    </div>
  </div>
  
  <script>
    // 自动重定向到博客（可选，3 秒后）
    // setTimeout(() => {
    //   window.location.href = '/blog2016/';
    // }, 3000);
  </script>
</body>
</html>
