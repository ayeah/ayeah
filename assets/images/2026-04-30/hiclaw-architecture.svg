<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="390" viewBox="0 0 700 390" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e8f5e9; stroke: #1aad19; stroke-width: 2px; rx: 8px; }
      .box-yellow { fill: #fff3cd; stroke: #ffc107; stroke-width: 2px; rx: 8px; }
      .box-blue { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2px; rx: 8px; }
      .box-purple { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2px; rx: 8px; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 14px; fill: #333; }
      .text-bold { font-weight: 600; }
      .text-small { font-size: 12px; fill: #666; }
      .arrow { stroke: #666; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #999; stroke-width: 2px; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- 用户层 -->
  <rect x="250" y="20" width="200" height="40" class="box-blue"/>
  <text x="350" y="45" text-anchor="middle" class="text text-bold">👥 用户层</text>
  
  <!-- 箭头 -->
  <line x1="350" y1="60" x2="350" y2="85" class="arrow"/>
  
  <!-- API Gateway -->
  <rect x="250" y="85" width="200" height="50" class="box-yellow"/>
  <text x="350" y="110" text-anchor="middle" class="text text-bold">🔗 API Gateway</text>
  <text x="350" y="127" text-anchor="middle" class="text text-small">认证/限流/路由/配额</text>
  
  <!-- 箭头 -->
  <line x1="350" y1="135" x2="350" y2="160" class="arrow"/>
  
  <!-- HiClaw Gateway -->
  <rect x="250" y="160" width="200" height="50" class="box"/>
  <text x="350" y="185" text-anchor="middle" class="text text-bold">🦐 HiClaw Gateway</text>
  <text x="350" y="202" text-anchor="middle" class="text text-small">多租户隔离</text>
  
  <!-- 箭头分叉 -->
  <line x1="350" y1="210" x2="350" y2="235" class="arrow"/>
  <line x1="350" y1="235" x2="200" y2="235" class="arrow"/>
  <line x1="350" y1="235" x2="500" y2="235" class="arrow"/>
  
  <!-- Agent 容器 -->
  <rect x="100" y="245" width="100" height="40" class="box-purple"/>
  <text x="150" y="270" text-anchor="middle" class="text text-small">内容策划</text>
  
  <rect x="300" y="245" width="100" height="40" class="box-purple"/>
  <text x="350" y="270" text-anchor="middle" class="text text-small">内容制作</text>
  
  <rect x="500" y="245" width="100" height="40" class="box-purple"/>
  <text x="550" y="270" text-anchor="middle" class="text text-small">运营推广</text>
  
  <!-- 箭头向下 -->
  <line x1="150" y1="285" x2="150" y2="310" class="arrow"/>
  <line x1="350" y1="285" x2="350" y2="310" class="arrow"/>
  <line x1="550" y1="285" x2="550" y2="310" class="arrow"/>
  
  <!-- 存储层 -->
  <rect x="80" y="310" width="140" height="50" class="box" style="fill:#ffebee;stroke:#f44336;"/>
  <text x="150" y="335" text-anchor="middle" class="text text-bold">PostgreSQL</text>
  <text x="150" y="352" text-anchor="middle" class="text text-small">元数据</text>
  
  <rect x="280" y="310" width="140" height="50" class="box" style="fill:#ffebee;stroke:#f44336;"/>
  <text x="350" y="335" text-anchor="middle" class="text text-bold">MinIO</text>
  <text x="350" y="352" text-anchor="middle" class="text text-small">文件存储</text>
  
  <rect x="480" y="310" width="140" height="50" class="box" style="fill:#ffebee;stroke:#f44336;"/>
  <text x="550" y="335" text-anchor="middle" class="text text-bold">Qdrant</text>
  <text x="550" y="352" text-anchor="middle" class="text text-small">向量检索</text>

</svg>