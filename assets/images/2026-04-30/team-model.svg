<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 700 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e8f5e9; stroke: #1aad19; stroke-width: 2px; rx: 8px; }
      .box-yellow { fill: #fff3cd; stroke: #ffc107; stroke-width: 2px; rx: 8px; }
      .box-blue { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2px; rx: 8px; }
      .box-purple { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2px; rx: 8px; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 14px; fill: #333; }
      .text-bold { font-weight: 600; }
      .text-small { font-size: 12px; fill: #666; }
      .arrow { stroke: #666; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #999; stroke-width: 2px; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- 标题 -->
  <text x="350" y="30" text-anchor="middle" class="text text-bold" font-size="16">📊 自媒体一人公司 5 人团队</text>
  
  <!-- 团队列表 -->
  <rect x="150" y="50" width="400" height="60" class="box"/>
  <text x="170" y="75" class="text text-bold">👤 内容策划</text>
  <text x="170" y="95" class="text text-small">选题、大纲、脚本、标题</text>
  
  <rect x="150" y="120" width="400" height="60" class="box"/>
  <text x="170" y="145" class="text text-bold">🎬 内容制作</text>
  <text x="170" y="165" class="text text-small">撰稿、拍摄、剪辑、设计</text>
  
  <rect x="150" y="190" width="400" height="60" class="box"/>
  <text x="170" y="215" class="text text-bold">📢 运营推广</text>
  <text x="170" y="235" class="text text-small">发布、互动、引流、涨粉</text>
  
  <rect x="150" y="260" width="400" height="60" class="box"/>
  <text x="170" y="285" class="text text-bold">💰 商务变现</text>
  <text x="170" y="305" class="text text-small">对接、报价、合同、回款</text>
  
  <rect x="150" y="330" width="400" height="60" class="box"/>
  <text x="170" y="355" class="text text-bold">📊 数据分析</text>
  <text x="170" y="375" class="text text-small">监控、复盘、优化、报告</text>

</svg>