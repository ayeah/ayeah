<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e8f5e9; stroke: #1aad19; stroke-width: 2px; rx: 8px; }
      .box-yellow { fill: #fff3cd; stroke: #ffc107; stroke-width: 2px; rx: 8px; }
      .box-blue { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2px; rx: 8px; }
      .box-purple { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2px; rx: 8px; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #333; }
      .text-bold { font-weight: 600; }
      .text-small { font-size: 12px; fill: #666; }
      .arrow { stroke: #666; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- 组织层 -->
  <rect x="150" y="20" width="300" height="60" class="box-blue"/>
  <text x="300" y="45" text-anchor="middle" class="text text-bold">📚 组织层记忆 (共享)</text>
  <text x="300" y="65" text-anchor="middle" class="text text-small">品牌定位/视觉规范/报价体系</text>
  
  <!-- 箭头 -->
  <line x1="300" y1="80" x2="300" y2="105" class="arrow"/>
  
  <!-- 项目层 -->
  <rect x="150" y="115" width="300" height="70" class="box"/>
  <text x="300" y="140" text-anchor="middle" class="text text-bold">📁 项目层记忆 (按平台)</text>
  <text x="300" y="160" text-anchor="middle" class="text text-small">公众号 | 小红书 | 抖音</text>
  <text x="300" y="175" text-anchor="middle" class="text text-small">粉丝画像/爆款模板/脚本结构</text>
  
  <!-- 箭头 -->
  <line x1="300" y1="185" x2="300" y2="210" class="arrow"/>
  
  <!-- 个人层 -->
  <rect x="150" y="220" width="300" height="60" class="box-purple"/>
  <text x="300" y="245" text-anchor="middle" class="text text-bold">👤 个人层记忆 (私有)</text>
  <text x="300" y="265" text-anchor="middle" class="text text-small">你的偏好/待办事项/私人笔记</text>

</svg>