<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="230" viewBox="0 0 600 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e8f5e9; stroke: #1aad19; stroke-width: 2px; rx: 8px; }
      .box-yellow { fill: #fff3cd; stroke: #ffc107; stroke-width: 2px; rx: 8px; }
      .box-blue { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2px; rx: 8px; }
      .box-purple { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2px; rx: 8px; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #333; }
      .text-bold { font-weight: 600; }
      .text-small { font-size: 12px; fill: #666; }
      .arrow { stroke: #666; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- 高端模型 -->
  <rect x="100" y="30" width="400" height="70" class="box-yellow"/>
  <text x="300" y="55" text-anchor="middle" class="text text-bold">🚀 复杂任务 → 高端模型</text>
  <text x="300" y="75" text-anchor="middle" class="text text-small">写作、分析、创意内容</text>
  <text x="300" y="92" text-anchor="middle" class="text text-small">DeepSeek-V4-Pro / GPT-4 | 预算：¥0.5-2/千字</text>
  
  <!-- 箭头 -->
  <line x1="300" y1="100" x2="300" y2="125" class="arrow"/>
  
  <!-- 经济模型 -->
  <rect x="100" y="135" width="400" height="70" class="box"/>
  <text x="300" y="160" text-anchor="middle" class="text text-bold">💰 简单任务 → 经济模型</text>
  <text x="300" y="180" text-anchor="middle" class="text text-small">回复、分类、格式化</text>
  <text x="300" y="197" text-anchor="middle" class="text text-small">DeepSeek-V4-Flash / GPT-3.5 | 预算：¥0.05-0.2/千字</text>

</svg>