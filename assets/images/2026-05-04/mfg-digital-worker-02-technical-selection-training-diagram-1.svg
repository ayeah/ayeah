<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      .box { rx:8; ry:8; stroke:#2dd4bf; stroke-width:2; }
      .title { font-family:sans-serif; font-size:16px; fill:#fff; font-weight:bold; }
      .content { font-family:sans-serif; font-size:13px; fill:#94a3b8; }
      .arrow { stroke:#2dd4bf; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2dd4bf"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="520" fill="#0f172a" rx="12"/>
  
  <!-- Layer 1: Organization -->
  <rect x="100" y="20" width="600" height="80" fill="#1a2a3a" class="box"/>
  <text x="400" y="50" class="title" text-anchor="middle">组织层 Organization</text>
  <text x="400" y="72" class="content" text-anchor="middle">公司制度 | 企业文化 | 标准流程 | 最佳实践</text>
  <text x="400" y="88" class="content" text-anchor="middle" font-size="11" fill="#64748b">[所有员工可读，管理员可写]</text>
  
  <!-- Arrow 1→2 -->
  <line x1="400" y1="100" x2="400" y2="128" class="arrow"/>
  
  <!-- Layer 2: Department -->
  <rect x="100" y="130" width="600" height="80" fill="#1e3a4a" class="box"/>
  <text x="400" y="160" class="title" text-anchor="middle">部门层 Department</text>
  <text x="400" y="182" class="content" text-anchor="middle">销售话术 | 技术方案 | 客户档案 | 项目复盘</text>
  <text x="400" y="198" class="content" text-anchor="middle" font-size="11" fill="#64748b">[本部门可读，部门主管可写]</text>
  
  <!-- Arrow 2→3 -->
  <line x1="400" y1="210" x2="400" y2="238" class="arrow"/>
  
  <!-- Layer 3: Team -->
  <rect x="100" y="240" width="600" height="80" fill="#224a5a" class="box"/>
  <text x="400" y="270" class="title" text-anchor="middle">团队层 Team</text>
  <text x="400" y="292" class="content" text-anchor="middle">项目文档 | 协作记录 | 技术分享 | 会议纪要</text>
  <text x="400" y="308" class="content" text-anchor="middle" font-size="11" fill="#64748b">[团队成员可读，团队负责人可写]</text>
  
  <!-- Arrow 3→4 -->
  <line x1="400" y1="320" x2="400" y2="348" class="arrow"/>
  
  <!-- Layer 4: Individual -->
  <rect x="100" y="350" width="600" height="80" fill="#265a6a" class="box"/>
  <text x="400" y="380" class="title" text-anchor="middle">个人层 Individual</text>
  <text x="400" y="402" class="content" text-anchor="middle">工作笔记 | 待办事项 | 个人偏好 | 会话历史</text>
  <text x="400" y="418" class="content" text-anchor="middle" font-size="11" fill="#64748b">[仅个人可读]</text>
  
  <!-- Labels -->
  <text x="50" y="55" font-family="sans-serif" font-size="11" fill="#2dd4bf" text-anchor="middle">全组织</text>
  <text x="50" y="165" font-family="sans-serif" font-size="11" fill="#2dd4bf" text-anchor="middle">部门</text>
  <text x="50" y="275" font-family="sans-serif" font-size="11" fill="#2dd4bf" text-anchor="middle">团队</text>
  <text x="50" y="385" font-family="sans-serif" font-size="11" fill="#2dd4bf" text-anchor="middle">个人</text>
  
  <!-- Access arrows (horizontal) -->
  <path d="M 60,60 L 60,390" stroke="#2dd4bf" stroke-width="1" fill="none" opacity="0.4"/>
  <circle cx="60" cy="60" r="3" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="60" cy="170" r="3" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="60" cy="280" r="3" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="60" cy="390" r="3" fill="#2dd4bf" opacity="0.6"/>
</svg>