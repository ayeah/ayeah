name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./admin

      - name: Build
        run: npm run build
        working-directory: ./admin
        env:
          NEXT_PUBLIC_SITE_URL: https://ayeah.net

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./admin/out
          publish_branch: gh-pages
          cname: ayeah.net
          user_name: '虾小弟'
          user_email: 'bot@ayeah.net'
          commit_message: 'deploy: auto deploy from main branch'
